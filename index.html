<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="visualizer-container">
            <h2 id="title">something</h2>
        </div>
        <div class="controls-container">
            <p class="selection-title shapes-title">SHAPES</p>
            <div class="tab-selector">
                <ul class="selector tab">
                    <li id="chords">CHORDS</li>
                    <li id="scales">SCALES</li>
                </ul>
            </div>
            <div class="mode-selector">
                <ul class="selector chords" id="chords-selector">
                    <li value="major">Major</li>
                    <li value="major7">Major 7</li>
                    <li value="minor">Minor</li>
                    <li value="minor7">Minor 7</li>
                    <li value="dominant7">Dominant 7</li>
                </ul>
                <ul class="selector scales" id="scales-selector">
                    <li value="major">Major</li>
                    <li value="minor">Minor</li>
                    <li value="major_pentatonic">Major Pentatonic</li>
                    <li value="minor_pentatonic">Minor Pentatonic</li>
                    <li value="harmonic">Harmonic</li>
                </ul>
            </div>
            <p class="selection-title roots-title">ROOT NOTES</p>
            <div class="root-selector">
                <ul class="selector root" id="root-selector">
                    <li value="0"></li>
                    <li value="1"></li>
                    <li value="2"></li>
                    <li value="3"></li>
                    <li value="4"></li>
                    <li value="5"></li>
                    <li value="6"></li>
                    <li value="7"></li>
                    <li value="8"></li>
                    <li value="9"></li>
                    <li value="10"></li>
                    <li value="11"></li>
                </ul>
            </div>
            <p class="selection-title settings-title">SETTINGS</p>
            <div class="settings">
                <div>
                    <p>NOTE STYLE</p>
                    <div class="select-style">
                        <span id="default-notes" class="active" value="B">Default</span>
                        <span id="alternative-notes" value="H">Alternative</span>
                    </div>
                </div>
                <div>
                    <p>SEMITONES</p>
                    <div class="select-semi">
                        <span id="sharp-notes" class="active" value="">Sharp</span>
                        <span id="flat-notes" value="1">Flat</span>
                    </div>
                </div>
                <div>
                    <p>FRET RANGE</p>
                    <div class="select-range">
                        <input type="number" id="input-min" min="0" max="12" value="0" class="input-fret">
                        <span>&ndash;</span>
                        <input type="number" id="input-max" min="4" max="21" value="21" class="input-fret">
                    </div>
                </div>
                <div class="tuning"></div>
            </div>
            <div class="notes">
                <div id="note-filter">
                </div>
            </div>
            
        </div>
    </div>
    <script src="notes.js"></script>
    <script src="interface.js"></script>
</body>

</html>
